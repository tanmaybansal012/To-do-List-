<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow — To-Do List</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <main class="container">

    <header class="header">
      <div class="header-tag">PRODUCTIVITY</div>
      <h1 class="title">Task<span class="accent">Flow</span></h1>
      <p class="subtitle">Capture. Organize. Accomplish.</p>
    </header>

    <div class="stats-bar">
      <div class="stat">
        <span class="stat-number" id="totalCount">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-number" id="activeCount">0</span>
        <span class="stat-label">Active</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-number" id="doneCount">0</span>
        <span class="stat-label">Done</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <span class="progress-label" id="progressLabel">0%</span>
      </div>
    </div>

    <div class="input-area">
      <input
        type="text"
        id="taskInput"
        class="task-input"
        placeholder="What needs to be done?"
        maxlength="120"
        autocomplete="off"
      />
      <select id="prioritySelect" class="priority-select">
        <option value="low">🟢 Low</option>
        <option value="medium" selected>🟡 Medium</option>
        <option value="high">🔴 High</option>
      </select>
      <button id="addBtn" class="add-btn">
        <span class="plus-icon">+</span> Add Task
      </button>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
      <button class="clear-btn" id="clearCompleted">Clear Done</button>
    </div>

    <ul class="task-list" id="taskList">
      <!-- Tasks injected by JS -->
    </ul>

    <div class="empty-state" id="emptyState">
      <div class="empty-icon">✦</div>
      <p>No tasks yet.<br/>Add one above to get started.</p>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
